services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: glintex
      POSTGRES_USER: glintex
      POSTGRES_PASSWORD: glintex
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U glintex -d glintex" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://glintex:glintex@db:5432/glintex
      SHADOW_DATABASE_URL: postgresql://glintex:glintex@db:5432/glintex_shadow
      PORT: 4000
      BARCODE_MATERIAL_CODE: ${BARCODE_MATERIAL_CODE:-MET}
      GOOGLE_DRIVE_CLIENT_ID: ${GOOGLE_DRIVE_CLIENT_ID}
      GOOGLE_DRIVE_CLIENT_SECRET: ${GOOGLE_DRIVE_CLIENT_SECRET}
      GOOGLE_DRIVE_REDIRECT_URI: ${GOOGLE_DRIVE_REDIRECT_URI}
      WWEBJS_WEB_VERSION: ${WWEBJS_WEB_VERSION:-2.3000.1031548524}
      WWEBJS_WEB_CACHE_STRICT: ${WWEBJS_WEB_CACHE_STRICT:-true}
      WWEBJS_WEB_CACHE_PATH: ${WWEBJS_WEB_CACHE_PATH:-/app/.wwebjs_cache}
    volumes:
      - ./apps/backend/.wwebjs_auth:/app/.wwebjs_auth
      - ./apps/backend/.wwebjs_cache:/app/.wwebjs_cache
      - ./apps/backend/backups:/app/backups
    shm_size: '1gb'
    ports:
      - "${BACKEND_PORT:-4001}:4000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:4001}
    ports:
      - "4173:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
  backend-whatsapp-auth:
